<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Game </title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{
  background: linear-gradient(135deg,#ff4d4d,#4d79ff);
  background-image:url('https://i.imgur.com/8Km9tLL.png');
  background-size:120px;
}
.card{transition:0.3s}
</style>
</head>
<body class="flex items-center justify-center min-h-screen text-white">

<div id="menu" class="text-center">
<h1 class="text-4xl mb-6 font-bold">💖 Love Game 💖</h1>

<button onclick="start('deep')" class="block mb-3 bg-white text-black px-6 py-3 rounded-2xl">💭 Глибокі</button>
<button onclick="start('light')" class="block mb-3 bg-white text-black px-6 py-3 rounded-2xl">😄 Легкі</button>
<button onclick="start('dreams')" class="block mb-3 bg-white text-black px-6 py-3 rounded-2xl">🌌 Мрії</button>
<button onclick="start('flirt')" class="block mb-3 bg-white text-black px-6 py-3 rounded-2xl">❤️ Флірт</button>
<button onclick="start('actions')" class="block mb-3 bg-white text-black px-6 py-3 rounded-2xl">🔥 Дії</button>
</div>

<div id="game" class="hidden text-center">
<button onclick="back()" class="mb-4 bg-gray-300 text-black px-4 py-2 rounded-xl">⬅ Назад</button>

<div id="card" class="card bg-white text-black p-8 rounded-3xl shadow-2xl max-w-md">
<p id="text"></p>
</div>

<div class="mt-4 flex gap-3 justify-center">
<button onclick="prev()" class="bg-white text-black px-6 py-3 rounded-2xl">⬅</button>
<button onclick="next()" class="bg-white text-black px-6 py-3 rounded-2xl">➡</button>
</div>
</div>

<script>
let current=[];
let index=0;

function gen(prefix){
  return Array.from({length:100},(_,i)=>`${prefix} ${i+1}: ${phrases[Math.floor(Math.random()*phrases.length)]}`);
}

const phrases=[
"Що ти відчуваєш до мене насправді?",
"Що в мені тебе найбільше приваблює?",
"Коли ти найбільше мене хотіла/хотів?",
"Що ти боїшся мені сказати?",
"Який момент з нами найгарячіший?",
"Що ти хочеш пережити зі мною?",
"Що тебе заводить у мені?",
"Чи ревнуєш ти мене?",
"Яку таємницю ти приховуєш?",
"Що ти відчуваєш прямо зараз?",
"Що б ти зробила зі мною зараз?",
"Коли ти зрозуміла що закохалась?",
"Що тебе найбільше ранить?",
"Чого ти боїшся у стосунках?",
"Який наш момент найцінніший?",
"Що ти хочеш змінити між нами?",
"Що ти думаєш про нас у майбутньому?",
"Що тобі в мені не подобається?",
"Що ти любиш у мені найбільше?",
"Яка твоя фантазія зі мною?"
];

const data={
 deep: gen("Глибоке"),
 light: gen("Легке"),
 dreams: gen("Мрія"),
 flirt: gen("Флірт"),
 actions: gen("Дія: зроби щось миле або романтичне")
};

function start(type){
  current=data[type];
  index=0;
  document.getElementById('menu').classList.add('hidden');
  document.getElementById('game').classList.remove('hidden');
  show();
}

function back(){
  document.getElementById('menu').classList.remove('hidden');
  document.getElementById('game').classList.add('hidden');
}

function show(){
  document.getElementById('text').innerText=current[index];
}

function next(){
  index=(index+1)%current.length;
  show();
}

function prev(){
  index=(index-1+current.length)%current.length;
  show();
}

// swipe
let startX=0;
document.getElementById('card').addEventListener('touchstart',e=>startX=e.touches[0].clientX);
document.getElementById('card').addEventListener('touchend',e=>{
 let endX=e.changedTouches[0].clientX;
 if(endX-startX>50) prev();
 if(startX-endX>50) next();
});
</script>

</body>
</html>
